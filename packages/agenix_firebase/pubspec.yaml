name: agenix_firebase
description: "Firebase (Firestore + Storage + Auth) data store backend for the agenix AI agent framework. Build Agentic AI apps with ease."
version: 1.0.1
homepage: https://github.com/ahmadexe/agenix
repository: https://github.com/ahmadexe/agenix/tree/main/packages/agenix_firebase

resolution: workspace

environment:
  sdk: ^3.7.2
  flutter: ">=1.17.0"

keywords:
  - flutter
  - ai
  - agenix
  - firebase
  - firestore

dependencies:
  flutter:
    sdk: flutter
  agenix: ^4.0.1
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ">=5.0.0 <7.0.0"
  mocktail: ^1.0.4
  fake_cloud_firestore: ^4.0.0
  firebase_auth_mocks: ^0.15.2

false_secrets:
  - example/**/firebase_options.dart
  - example/**/google-services.json
  - example/**/GoogleService-Info.plist

flutter:
